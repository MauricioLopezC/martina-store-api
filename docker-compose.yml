services:
  postgres:
    image: postgres:17-alpine
    container_name: martina-store-postgres
    environment:
      POSTGRES_DB: martina-store-nest
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
